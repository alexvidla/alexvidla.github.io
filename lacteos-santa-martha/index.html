<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>En construcción</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #0a0f1a 0%, #0a0a0a 100%);
            font-family: 'Poppins', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: white;
            overflow: hidden;
        }

        .container {
            animation: fadeIn 1s ease;
            padding: 20px;
        }

        h1 {
            font-size: 72px;
            font-weight: 800;
            background: linear-gradient(135deg, #fc6f03, #ffaa44);
            background-clip: text;
            color: transparent;
            margin-bottom: 20px;
        }

        .emoji {
            font-size: 80px;
            animation: bounce 2s infinite;
            display: inline-block;
        }

        p {
            font-size: 20px;
            max-width: 600px;
            margin: 20px auto;
            color: #ccc;
        }

        .btn {
            display: inline-block;
            margin-top: 30px;
            padding: 12px 30px;
            background: #fc6f03;
            color: white;
            text-decoration: none;
            border-radius: 40px;
            font-weight: bold;
            transition: 0.3s;
            box-shadow: 0 0 10px #fc6f03;
        }

        .btn:hover {
            background: #ff5500;
            transform: scale(1.05);
            box-shadow: 0 0 20px #fc6f03;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        @media (max-width: 768px) {
            h1 { font-size: 42px; }
            .emoji { font-size: 60px; }
            p { font-size: 16px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="emoji">🚧</div>
        <h1>En Construcción</h1>
        
        <p>"""...Esta Página Fue una Muestra Profesional.<br> Si Llegaste Aquí, es porque el Dueño de este Negocio aún no Decide Crecer Digitalmente..."""</p>
        <p style="font-size: 14px; color: #fc6f03;">Decidió no Continuar. Mientras él Pierde Clientes, Nosotros Seguimos Trabajando y Mejorando.</p>
        <!--<a href="https://alexvidla.github.io" class="btn">Volver al portafolio</a>-->
    </div>
</body>
</html>
